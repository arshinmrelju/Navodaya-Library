<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayodayam - Offline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #083344;
            --primary-light: #0e7490;
            --bg-color: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }

        .container {
            max-width: 400px;
            background: white;
            padding: 48px 32px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(8, 51, 68, 0.1);
            border: 1px solid rgba(8, 51, 68, 0.05);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(14, 116, 144, 0.1);
            color: var(--primary-light);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px;
            letter-spacing: -0.5px;
            color: var(--primary-color);
        }

        p {
            font-family: 'Inter', sans-serif;
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .retry-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            display: block;
            text-decoration: none;
        }

        .retry-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(8, 51, 68, 0.2);
        }

        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your connection. Don't worry, you can still access your library card and cached books once you're back online.</p>
        <a href="index.html" class="retry-btn">Try Reconnect</a>
        <div class="footer">Nayodayam Library</div>
    </div>
</body>
</html>
